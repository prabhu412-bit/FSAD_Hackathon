server.port=8080

# File-based H2 DB — data persists across restarts
spring.datasource.url=jdbc:h2:file:./data/airline_cases;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 Web Console for Executive Demo
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Excel export path (cases are saved here automatically)
app.excel.export-path=./data/airline_cases.xlsx

# Actuator + health
management.endpoints.web.exposure.include=health,info

# OpenAPI docs
springdoc.swagger-ui.path=/api-docs

