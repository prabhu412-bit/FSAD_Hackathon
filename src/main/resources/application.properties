spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:${PORT:8080}}

# In-memory DB for hackathon demo
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:h2:mem:airline_cases;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}

# Excel export path (cases are saved here automatically)
app.excel.export-path=${APP_EXCEL_EXPORT_PATH:./data/airline_cases.xlsx}

# Actuator + health
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}

# OpenAPI docs
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/api-docs}


