server.port=8080

# In-memory DB for hackathon demo
spring.datasource.url=jdbc:h2:mem:airline_cases;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Excel export path (cases are saved here automatically)
app.excel.export-path=./data/airline_cases.xlsx

# Actuator + health
management.endpoints.web.exposure.include=health,info

# OpenAPI docs
springdoc.swagger-ui.path=/api-docs

