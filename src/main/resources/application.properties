spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}

# In-memory DB for hackathon demo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:airline_cases;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}

# Excel export path (cases are saved here automatically)
app.excel.export-path=${APP_EXCEL_EXPORT_PATH:./data/airline_cases.xlsx}

# Actuator + health
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}

# OpenAPI docs
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/api-docs}

# Portal login credentials (change in production)
app.auth.admin.username=${APP_AUTH_ADMIN_USERNAME:admin}
app.auth.admin.password=${APP_AUTH_ADMIN_PASSWORD:admin123}
app.auth.customer.username=${APP_AUTH_CUSTOMER_USERNAME:customer}
app.auth.customer.password=${APP_AUTH_CUSTOMER_PASSWORD:customer123}

